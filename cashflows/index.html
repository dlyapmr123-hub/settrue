    <style>
        /* === GLOBAL STYLES (SetTrue Strict Style) === */

        body { background: #050507; font-family: 'Inter', sans-serif; overflow-x: hidden; min-height: 100vh; color: #fff; }
        
        /* Particles */
        .global-particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; overflow: hidden; mask-image: radial-gradient(circle at center, transparent 0%, transparent 35%, black 70%, black 100%); -webkit-mask-image: radial-gradient(circle at center, transparent 0%, transparent 35%, black 70%, black 100%); }

        @keyframes floatUpGlobal { 0% { transform: translateY(0) translateX(0); opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.7; } 100% { transform: translateY(-120vh) translateX(var(--shift, 40px)); opacity: 0; } }

        /* Header */

            transition: all 0.3s; text-decoration: none; display: inline-block;

        .logo span { color: #ccff00; text-shadow: 0 0 15px rgba(204, 255, 0, 0.6); }
        .description { text-align: center; color: #888; font-size: 0.9rem; max-width: 600px; margin: 0 auto; }

        /* Content Area */

        /* Footer */
        footer { width: 100%; background: rgba(10, 10, 15, 0.95); border-top: 1px solid rgba(210, 255, 64, 0.15); padding: 30px 20px; text-align: center; color: #666; font-size: 0.8rem; position: relative; z-index: 10; }
        footer a { color: #888; text-decoration: none; }
        footer a:hover { color: #d2ff40; }

        /* === TABS SWITCHER === */
        .sport-tabs {
            display: flex; justify-content: center; gap: 15px; margin: 20px 0 30px 0;
        }
        .tab-btn {
            background: transparent; border: 1px solid #333; color: #888;
            padding: 10px 25px; border-radius: 30px; cursor: pointer;
            font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.9rem;
            transition: all 0.3s;
        }
        .tab-btn:hover { border-color: #666; color: #fff; }
        .tab-btn.active {
            background: rgba(204, 255, 0, 0.1); border-color: #ccff00; color: #ccff00;
            box-shadow: 0 0 15px rgba(204, 255, 0, 0.15);
        }

        /* === MONEY FLOW TABLE STYLES === */
        :root { --neon: #39ff14; --danger: #ff2a2a; --border-mf: #1a1a1a; }
        .mf-container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }
        .mf-header { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; font-size: 1.2rem; font-weight: 700; text-transform: uppercase; color: #fff; }
        .live-dot { width: 8px; height: 8px; background: var(--neon); border-radius: 50%; box-shadow: 0 0 10px var(--neon); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .match-card { background: #0a0a0c; border: 1px solid var(--border-mf); border-radius: 12px; margin-bottom: 20px; overflow: hidden; transition: transform 0.2s; }
        .match-card:hover { border-color: #333; transform: translateY(-2px); }
        
        .match-info { background: rgba(255,255,255,0.02); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-mf); font-size: 0.75rem; color: #888; }
        .tour-name { color: #fff; font-weight: 600; margin-right: 8px; }
        .total-val { color: #fff; opacity: 0.9; font-weight: 500; }

        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 10px 15px; color: #666; font-size: 0.7rem; text-transform: uppercase; border-bottom: 1px solid #222; }
        td { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: middle; white-space: nowrap; }
        tr:last-child td { border-bottom: none; }
        
        .player, .team-name { font-weight: 600; font-size: 0.95rem; color: #fff; }
        .team-name { min-width: 120px; display: inline-block; }
        
        .odds { font-size: 0.9rem; font-weight: 500; font-variant-numeric: tabular-nums; display: inline-block; min-width: 40px; text-align: center; }
        .odds-fav { color: var(--neon); text-shadow: 0 0 8px rgba(57, 255, 20, 0.3); font-weight: 600; }
        .odds-reg { color: #666; }

        .money-cell { display: flex; flex-direction: column; gap: 4px; min-width: 100px; }
        .money-line { display: flex; justify-content: space-between; font-size: 0.8rem; }
        .money-white { color: #fff; font-weight: 600; }
        
        .bar-track { width: 100%; height: 3px; background: #111; border-radius: 2px; overflow: hidden; margin-top: 2px; }
        .bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; box-shadow: 0 0 6px currentColor; }
        
        .c-neon { color: var(--neon); }
        .c-danger { color: var(--danger); }
        .loading-mf { text-align: center; padding: 40px; color: #666; }

<body>

<div class="global-particles" id="globalParticles"></div>

<section class="hero">
    <div class="logo">True<span>Set</span></div>
    <div class="nav-buttons">
        <a href="/index.html" class="nav-btn">Главная</a>
        <a href="/predict/" class="nav-btn">Прогнозы</a>
        <a href="/scanmatch/" class="nav-btn">Оценка матчей</a>
        <a href="#" class="nav-btn active">Денежные потоки</a>
    </div>
    <div class="description">Money Flow Analytics</div>
</section>

<div id="page-content">
    <div class="sport-tabs">
        <button class="tab-btn active" onclick="switchTab('tennis')">Теннис</button>
        <button class="tab-btn" onclick="switchTab('football')">Футбол</button>
    </div>
    
    <div class="mf-container">
        <div class="mf-header"><div class="live-dot"></div> <span id="sport-title">Tennis Money Flow</span></div>
        <div id="mf-table-container">
            <div class="loading-mf">Загрузка данных...</div>
        </div>
    </div>
</div>

<footer>
    <p>© SetTrue — Математические прогнозы. Все права защищены.</p>
    <p style="margin-top:10px;"><a href="mailto:SetTrueForecast@yandex.ru">SetTrueForecast@yandex.ru</a></p>
</footer>

<script>
    // === НАСТРОЙКИ ССЫЛОК ===
    const TENNIS_API = 'https://script.google.com/macros/s/AKfycbz-A3jedYI4Gq4cKpH0vwaXL9a5eVTIoV8Gz5oIxEA8Gwm68O0_T8xQzwifDwIcHx1-/exec';
    const FOOTBALL_API = 'https://script.google.com/macros/s/AKfycbz6fcoEoNF_C7CpNENGoQHEgCGry91Mi9xDPck0Xv2YUd3zW33UjMGCGgBD-ZkXte3z/exec'; // Вставь сюда ссылку на футбол

    let currentSport = 'tennis';

    function parseStr(str) {
        if (!str) return { pct: 0, pctStr: "0%", money: "£ 0", rawVal: 0 };
        let clean = str.replace(/&pound;/g, '£');
        let p = clean.match(/(\d+\.?\d*)\s*%/);
        let m = clean.match(/([£$])\s*([\d\s,]+)/);
        let rawVal = 0;
        if (m) rawVal = parseFloat(m[2].replace(/\s/g, '').replace(',', '.'));
        return { pct: p ? parseFloat(p[1]) : 0, pctStr: p ? p[1] + "%" : "0%", money: m ? m[1] + m[2] : "£ 0", rawVal };
    }

    function switchTab(sport) {
        currentSport = sport;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        
        document.getElementById('sport-title').innerText = sport === 'tennis' ? 'Tennis Money Flow' : 'Football Money Flow';
        loadData();
    }

    async function loadData() {
        const container = document.getElementById('mf-table-container');
        container.innerHTML = '<div class="loading-mf">Загрузка данных...</div>';
        
        const API_URL = currentSport === 'tennis' ? TENNIS_API : FOOTBALL_API;

        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            
            if (!data || !Array.isArray(data) || data.length === 0) {
                container.innerHTML = '<div class="loading-mf">Нет активных матчей</div>';
                return;
            }

            let html = '';

            if (currentSport === 'football') {
                // === ЛОГИКА ФУТБОЛА (3 исхода + Сортировка) ===
                
                // 1. Создаем массив объектов для сортировки
                let matchesToRender = [];
                
                data.forEach(row => {
                    if (row.length < 9) return; 
                    let tour = row[0] || ""; let time = row[1] || "";
                    let team1 = row[2]; let team2 = row[9] || row[row.length-1]; 
                    let o1 = row[3]; let oX = row[4]; let o2 = row[5];
                    let d1 = parseStr(row[6]); let dX = parseStr(row[7]); let d2 = parseStr(row[8]);
                    
                    let totalSum = d1.rawVal + dX.rawVal + d2.rawVal;
                    let totalFmt = "£ " + totalSum.toLocaleString('en-US');
                    
                    // Фаворит
                    let vals = [parseFloat(o1), parseFloat(oX), parseFloat(o2)];
                    let minVal = Math.min(...vals.filter(v => !isNaN(v)));
                    let c1 = (parseFloat(o1)===minVal)?'odds-fav':'odds-reg';
                    let cX = (parseFloat(oX)===minVal)?'odds-fav':'odds-reg';
                    let c2 = (parseFloat(o2)===minVal)?'odds-fav':'odds-reg';
                    
                    // Цвета денег
                    let maxPct = Math.max(d1.pct, dX.pct, d2.pct);
                    let col1 = (d1.pct===maxPct&&d1.pct>0)?'var(--neon)':'var(--danger)';
                    let colX = (dX.pct===maxPct&&dX.pct>0)?'var(--neon)':'var(--danger)';
                    let col2 = (d2.pct===maxPct&&d2.pct>0)?'var(--neon)':'var(--danger)';
                    let cls1 = (d1.pct===maxPct&&d1.pct>0)?'c-neon':'c-danger';
                    let clsX = (dX.pct===maxPct&&dX.pct>0)?'c-neon':'c-danger';
                    let cls2 = (d2.pct===maxPct&&d2.pct>0)?'c-neon':'c-danger';

                    let cardHTML = `
                    <div class="match-card">
                        <div class="match-info">
                            <div><span class="tour-name">${tour}</span><span>${time}</span></div>
                            <span class="total-val">Всего: ${totalFmt}</span>
                        </div>
                        <div class="table-responsive"><table>
                            <tr>
                                <td width="25%"><div class="team-name">${team1} (П1)</div></td>
                                <td width="10%"><span class="odds ${c1}">${o1}</span></td>
                                <td width="65%"><div class="money-cell"><div class="money-line"><span class="money-white">${d1.money}</span><span class="${cls1}">${d1.pctStr}</span></div><div class="bar-track"><div class="bar-fill" style="width:${d1.pct}%; background:${col1}"></div></div></div></td>
                            </tr>
                            <tr>
                                <td><div class="team-name" style="color:#aaa">Ничья (Х)</div></td>
                                <td><span class="odds ${cX}">${oX}</span></td>
                                <td><div class="money-cell"><div class="money-line"><span class="money-white">${dX.money}</span><span class="${clsX}">${dX.pctStr}</span></div><div class="bar-track"><div class="bar-fill" style="width:${dX.pct}%; background:${colX}"></div></div></div></td>
                            </tr>
                            <tr>
                                <td><div class="team-name">${team2} (П2)</div></td>
                                <td><span class="odds ${c2}">${o2}</span></td>
                                <td><div class="money-cell"><div class="money-line"><span class="money-white">${d2.money}</span><span class="${cls2}">${d2.pctStr}</span></div><div class="bar-track"><div class="bar-fill" style="width:${d2.pct}%; background:${col2}"></div></div></div></td>
                            </tr>
                        </table></div>
                    </div>`;
                    
                    matchesToRender.push({ html: cardHTML, total: totalSum });
                });

                // Сортировка футбола по тоталу
                matchesToRender.sort((a, b) => b.total - a.total);
                matchesToRender.forEach(item => html += item.html);

            } else {
                // === ЛОГИКА ТЕННИСА (2 исхода) ===
                data.forEach(row => {
                    if (row.length < 8) return; 
                    let tour = row[1] || ""; let time = row[2] || "";
                    let p1 = row[3]; let p2 = row[8];
                    if (!p1 || !p2 || p1.match(/\d/) || p2.match(/\d/)) return;

                    let o1 = row[4]; let o2 = row[5];
                    let d1 = parseStr(row[6]); let d2 = parseStr(row[7]);
                    let totalSum = d1.rawVal + d2.rawVal;
                    let totalFmt = "£ " + totalSum.toLocaleString('en-US');

                    let c1 = (parseFloat(o1)<parseFloat(o2))?'odds-fav':'odds-reg';
                    let c2 = (parseFloat(o2)<parseFloat(o1))?'odds-fav':'odds-reg';
                    
                    let col1 = d1.pct>=d2.pct?'var(--neon)':'var(--danger)';
                    let col2 = d2.pct>=d1.pct?'var(--neon)':'var(--danger)';
                    let cls1 = d1.pct>=d2.pct?'c-neon':'c-danger';
                    let cls2 = d2.pct>=d1.pct?'c-neon':'c-danger';

                    html += `
                    <div class="match-card">
                        <div class="match-info">
                            <div><span class="tour-name">${tour}</span><span>${time}</span></div>
                            <span class="total-val">Всего: ${totalFmt}</span>
                        </div>
                        <table>
                            <tr>
                                <td width="35%"><div class="player">${p1}</div></td>
                                <td width="15%"><span class="odds ${c1}">${o1}</span></td>
                                <td width="50%"><div class="money-cell"><div class="money-line"><span class="money-white">${d1.money}</span><span class="${cls1}">${d1.pctStr}</span></div><div class="bar-track"><div class="bar-fill" style="width:${d1.pct}%; background:${col1}"></div></div></div></td>
                            </tr>
                            <tr>
                                <td><div class="player">${p2}</div></td>
                                <td><span class="odds ${c2}">${o2}</span></td>
                                <td><div class="money-cell"><div class="money-line"><span class="money-white">${d2.money}</span><span class="${cls2}">${d2.pctStr}</span></div><div class="bar-track"><div class="bar-fill" style="width:${d2.pct}%; background:${col2}"></div></div></div></td>
                            </tr>
                        </table>
                    </div>`;
                });
            }
            
            container.innerHTML = html;

        } catch (e) {
            console.error(e);
            container.innerHTML = '<div class="loading-mf">Ошибка соединения</div>';
        }
    }
    
    // Particles Logic
    function createGlobalParticles() {
        const container = document.getElementById('globalParticles');
        if (!container) return;
        const isMobile = window.innerWidth < 768;
        const particleCount = isMobile ? 40 : 100;
        container.innerHTML = '';
        for (let i = 0; i < particleCount; i++) {
            const p = document.createElement('div');
            p.classList.add('global-particle');
            const size = Math.random() * 6 + 2;
            p.style.width = size + 'px'; p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (Math.random() * 12 + 8) + 's';
            p.style.animationDelay = (Math.random() * 10) + 's';
            p.style.background = `radial-gradient(circle, rgba(204, 255, 0, ${Math.random() * 0.6 + 0.2}), rgba(204, 255, 0, 0))`;
            p.style.setProperty('--shift', ((Math.random() - 0.5) * 100) + 'px');
            container.appendChild(p);
        }
    }

    window.addEventListener('DOMContentLoaded', () => {
        createGlobalParticles();
        loadData(); // Load default (Tennis)
    });
    
    window.addEventListener('resize', () => {
        clearTimeout(window.resizeTimer);
        window.resizeTimer = setTimeout(createGlobalParticles, 250);
    });
</script>
</body>
</html>
